services:
  n8n:
    image: n8nio/n8n:latest
    container_name: matchpilot-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - TZ=Europe/Riga
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false
      - N8N_ENCRYPTION_KEY=matchpilot_super_secret_key_123456
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data: